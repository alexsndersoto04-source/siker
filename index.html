<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKER Engine v1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --g-blue: #4285f4; --g-red: #ea4335; --g-yellow: #fbbc05; --g-green: #34a853; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #fff; }
        .header { display: flex; align-items: center; padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; justify-content: space-between; }
        .menu-icon { font-size: 24px; cursor: pointer; color: #5f6368; padding: 10px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #fff; box-shadow: 5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1000; padding-top: 20px; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; font-size: 16px; color: #3c4043; }
        .menu-item:hover { background: #f1f3f4; }
        .menu-item i { margin-right: 20px; width: 25px; text-align: center; }
        .main { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 75vh; }
        .logo { font-size: 70px; font-weight: bold; margin-bottom: 30px; }
        .logo span:nth-child(1) { color: var(--g-blue); }
        .logo span:nth-child(2) { color: var(--g-red); }
        .logo span:nth-child(3) { color: var(--g-yellow); }
        .logo span:nth-child(4) { color: var(--g-blue); }
        .logo span:nth-child(5) { color: var(--g-green); }
        .logo span:nth-child(6) { color: var(--g-red); }
        .search-container { width: 90%; max-width: 580px; position: relative; }
        .search-box { width: 100%; padding: 14px 20px; border-radius: 30px; border: 1px solid #dfe1e5; font-size: 16px; outline: none; }
        #status-bar { position: fixed; bottom: 0; width: 100%; background: #f2f2f2; padding: 10px 20px; font-size: 13px; color: #70757a; border-top: 1px solid #dadce0; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
        <div style="font-size: 14px; color: #555;">Siker Engine - Redmi 9C</div>
    </div>

    <div id="sideMenu" class="side-menu">
        <div class="menu-item" onclick="verHistorial()"><i class="fas fa-history"></i> Historial Real</div>
        <div class="menu-item"><i class="fas fa-cog"></i> Configuraciones</div>
        <div class="menu-item" onclick="toggleMenu()"><i class="fas fa-times"></i> Cerrar</div>
    </div>

    <div class="main">
        <div class="logo"><span>S</span><span>I</span><span>K</span><span>E</span><span>R</span></div>
        <div class="search-container">
            <input type="text" class="search-box" placeholder="Busca en tu motor binario...">
        </div>
    </div>

    <div id="status-bar">Estado: <span id="motorStatus">Listo</span></div>

    <script>
        // ESTA ES TU DIRECCIÓN ACTUAL
        const URL_MOTOR = "https://224ead6bb2e8ceab-200-36-155-52.serveousercontent.com";

        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('active');
        }

        async function verHistorial() {
            toggleMenu();
            const status = document.getElementById('motorStatus');
            status.innerText = "Consultando Redmi 9C...";
            
            try {
                // Hacemos la llamada real a Termux
                const response = await fetch(`${URL_MOTOR}/historial`);
                const data = await response.json();
                
                if (data.historial) {
                    alert("HISTORIAL ENCONTRADO:\n\n" + data.historial.join("\n"));
                    status.innerText = "Conexión exitosa";
                }
            } catch (e) {
                alert("EL MOTOR NO RESPONDE.\n1. Verifica que Termux esté corriendo.\n2. Asegúrate de que diste clic en 'Continue' en la pestaña de Serveo.");
                status.innerText = "Error de conexión";
            }
        }
    </script>
</body>
</html>
