<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKER | Motor de Navegación ARM</title>
    <style>
        :root {
            --white: #ffffff; --gray-100: #f8f9fa; --gray-200: #e8eaed;
            --text: #202124; --text-sub: #70757a;
            --siker-blue: #4285f4; --siker-green: #34a853;
            --siker-gradient: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            --shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
        body { background-color: var(--white); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        
        header { width: 100%; padding: 15px 30px; display: flex; justify-content: flex-end; align-items: center; gap: 20px; font-size: 13px; }
        header a { color: rgba(0,0,0,0.87); text-decoration: none; }
        header a:hover { text-decoration: underline; }
        .icon-menu { color: var(--text-sub); font-size: 20px; cursor: pointer; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--siker-gradient); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        .container { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 15vh; }
        
        .logo { 
            font-size: 92px; font-weight: 500; letter-spacing: -4px; margin-bottom: 30px;
            background: var(--siker-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .search-area { width: 90%; max-width: 584px; }
        .search-bar {
            display: flex; align-items: center; padding: 10px 20px; border: 1px solid #dfe1e5; border-radius: 24px;
            transition: box-shadow 0.2s; background: white;
        }
        .search-bar:hover, .search-bar:focus-within { box-shadow: var(--shadow); border-color: rgba(223,225,229,0); }
        .search-bar input { flex: 1; border: none; outline: none; font-size: 16px; padding: 5px 10px; color: var(--text); }
        .search-icon { color: #9aa0a6; }

        .btns { margin-top: 30px; display: flex; gap: 12px; }
        button { 
            background-color: #f8f9fa; border: 1px solid #f8f9fa; color: #3c4043;
            padding: 10px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; 
        }
        button:hover { border: 1px solid #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); color: #202124; }

        .results-view .container { padding-top: 20px; align-items: flex-start; padding-left: 5%; }
        .results-view .logo { font-size: 24px; letter-spacing: -1px; position: absolute; top: 25px; left: 30px; }
        .results-view .search-area { margin-left: 130px; margin-top: 5px; }
        .results-view .btns { display: none; }
        
        .tabs { display: none; width: 100%; border-bottom: 1px solid #ebebeb; margin-top: 20px; padding-left: 165px; }
        .results-view .tabs { display: flex; gap: 20px; }
        .tab { padding: 12px 0; color: #70757a; font-size: 14px; cursor: pointer; position: relative; }
        .tab.active { color: #1a73e8; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #1a73e8; }

        #results-list { width: 100%; max-width: 650px; margin-left: 165px; margin-top: 20px; display: none; }
        .result-item { margin-bottom: 30px; }
        .result-item a { color: #1a0dab; font-size: 20px; text-decoration: none; }
        .result-item a:hover { text-decoration: underline; }
        .result-item p { color: #4d5156; font-size: 14px; line-height: 1.58; margin-top: 5px; }

        footer { background: #f2f2f2; border-top: 1px solid #e4e4e4; padding: 15px 30px; color: #70757a; font-size: 14px; margin-top: auto; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body id="body">

    <header>
        <a href="#">Motor ARM</a>
        <a href="#">Redmi 9C Console</a>
        <i class="fas fa-th icon-menu"></i>
        <div class="avatar">A</div>
    </header>

    <div class="container" id="mainContainer">
        <div class="logo" onclick="window.location.reload()">SIKER</div>

        <div class="search-area">
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="q" placeholder="Buscar en el motor binario..." onkeypress="if(event.key==='Enter') ejecutarMotor()">
            </div>
        </div>

        <div class="btns">
            <button onclick="ejecutarMotor()">Buscar con SIKER</button>
            <button onclick="window.location.reload()">Resetear Motor</button>
        </div>

        <div class="tabs">
            <div class="tab active">Todo</div>
            <div class="tab">ARM Binarios</div>
            <div class="tab">Ciencia</div>
            <div class="tab">Resultados Reales</div>
        </div>

        <div id="results-list"></div>
    </div>

    <footer>
        Alexander Soto | SIKER Engine v10.0 | Ejecutando 46 funciones reales
    </footer>

    <script>
        async function ejecutarMotor() {
            const query = document.getElementById('q').value.toLowerCase();
            if(!query) return;

            document.body.classList.add('results-view');
            const resultsArea = document.getElementById('results-list');
            resultsArea.style.display = 'block';
            resultsArea.innerHTML = "<p style='color: #70757a;'>Conectando con el motor ARM en el Redmi 9C...</p>";

            try {
                // INTENTA LEER EL ARCHIVO QUE TU MOTOR SUBIRÁ
                const respuesta = await fetch('resultados.json');
                if (!respuesta.ok) throw new Error('No hay datos');
                
                const datos = await respuesta.json();
                
                // FILTRA POR LA BÚSQUEDA
                const filtrados = datos.filter(item => 
                    item.titulo.toLowerCase().includes(query) || 
                    item.descripcion.toLowerCase().includes(query)
                );

                if(filtrados.length > 0) {
                    resultsArea.innerHTML = filtrados.map(res => `
                        <div class="result-item">
                            <a href="${res.url}" target="_blank">${res.titulo}</a>
                            <p>${res.descripcion}</p>
                            <small style="color:var(--siker-green)">Fuente: mi_google.db (Función ARM Binaria)</small>
                        </div>
                    `).join('');
                } else {
                    resultsArea.innerHTML = `
                        <div class="result-item">
                            <p>No se encontraron coincidencias para <b>${query}</b> en la base de datos local.</p>
                            <p style="font-size: 12px; color: gray;">Asegúrate de que el motor en Termux haya indexado esta información.</p>
                        </div>`;
                }
            } catch (e) {
                // SI NO EXISTE EL ARCHIVO JSON TODAVÍA, MUESTRA ESTO:
                resultsArea.innerHTML = `
                    <div class="result-item">
                        <a href="#">Buscador en modo espera</a>
                        <p>El motor SIKER está activo pero el archivo <b>resultados.json</b> no se ha detectado en el servidor.</p>
                        <p style="color: #d93025;">Error técnico: Esperando sincronización desde Termux (Redmi 9C).</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
