<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKER - Motor Binario Alexander Soto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #4285f4; --bg-color: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg-color); }
        
        /* Encabezado y Menú */
        .header { display: flex; align-items: center; padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .menu-icon { font-size: 24px; cursor: pointer; margin-right: 20px; color: #555; }
        
        /* Contenedor Principal */
        .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .logo { font-size: 60px; font-weight: bold; margin-bottom: 30px; color: #4285f4; }
        .logo span:nth-child(2) { color: #ea4335; }
        .logo span:nth-child(3) { color: #fbbc05; }
        .logo span:nth-child(4) { color: #34a853; }
        
        /* Buscador */
        .search-box { width: 90%; max-width: 580px; position: relative; }
        .search-box input { width: 100%; padding: 15px 20px; border-radius: 30px; border: 1px solid #dfe1e5; font-size: 16px; outline: none; box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
        
        /* Menú Lateral */
        .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; padding-top: 60px; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; font-size: 16px; color: #333; }
        .menu-item:hover { background: #f1f3f4; }
        .menu-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* Estado del Motor */
        #status-text { position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars menu-icon" onclick="toggleSideMenu()"></i>
        <span>Siker Engine v1.0 - Redmi 9C</span>
    </div>

    <div id="sideMenu" class="side-menu">
        <div class="menu-item" onclick="verHistorialReal()">
            <i class="fas fa-history"></i> Historial (Real)
        </div>
        <div class="menu-item">
            <i class="fas fa-cog"></i> Configuraciones
        </div>
        <div class="menu-item">
            <i class="fas fa-microchip"></i> Motor Binario ARM
        </div>
    </div>

    <div class="main-container">
        <div class="logo">
            <span>S</span><span>I</span><span>K</span><span>E</span><span>R</span>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Busca en tu propio Google...">
        </div>
    </div>

    <div id="status-text">Motor SIKER listo.</div>

    <script>
        // NUEVA DIRECCIÓN INTEGRADA (224ead6bb2e8ceab)
        const URL_MOTOR = "https://224ead6bb2e8ceab-200-36-155-52.serveousercontent.com";

        function toggleSideMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        async function verHistorialReal() {
            // Verificamos si el menú está abierto antes de intentar cerrarlo
            const sideMenu = document.getElementById('sideMenu');
            if (sideMenu.classList.contains('active')) {
                toggleSideMenu();
            }

            const status = document.getElementById('status-text');
            status.innerText = "Consultando mi_google.db en el Redmi 9C...";

            try {
                // Petición al servidor Python en Termux usando la nueva URL
                const respuesta = await fetch(`${URL_MOTOR}/historial`);
                
                if (!respuesta.ok) throw new Error("No se pudo conectar");
                
                const datos = await respuesta.json();
                
                if (datos.historial && datos.historial.length > 0) {
                    alert("HISTORIAL REAL DESDE TERMUX:\n\n" + datos.historial.map(d => "- " + d).join("\n"));
                } else {
                    alert("Motor conectado, pero el historial está vacío.");
                }
            } catch (error) {
                alert("ERROR DE CONEXIÓN:\n\n1. Revisa que Termux tenga el servidor y el túnel activos.\n2. Asegúrate de dar clic en 'Continue to Site' en el link de Serveo en una pestaña aparte.");
                console.error(error);
            } finally {
                status.innerText = "Motor SIKER listo.";
            }
        }
    </script>
</body>
</html>
