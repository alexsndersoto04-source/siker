<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKER - Proyecto Alexander</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .logo { font-size: 50px; font-weight: bold; color: #4285f4; margin-bottom: 20px; }
        .btn { padding: 15px 30px; background: #4285f4; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #status { margin-top: 20px; color: #666; }
    </style>
</head>
<body>

    <div class="logo">SIKER</div>
    
    <button class="btn" onclick="consultarMotor()">
        <i class="fas fa-database"></i> VER HISTORIAL REAL
    </button>

    <p id="status">Estado: Listo para conectar</p>

    <script>
        // ESTA ES LA URL QUE TE DIO LA PANTALLA DE "EXTRAVIADO"
        const URL_MOTOR = "https://224ead6bb2e8ceab-200-36-155-52.serveousercontent.com";

        async function consultarMotor() {
            const st = document.getElementById('status');
            st.innerText = "Conectando al Redmi 9C...";
            
            try {
                const respuesta = await fetch(`${URL_MOTOR}/historial`);
                const datos = await respuesta.json();
                
                if (datos.historial) {
                    alert("¡LOGRADO, ALEXANDER!\n\nDatos en tu base de datos:\n" + datos.historial.join("\n"));
                    st.innerText = "Conexión exitosa.";
                }
            } catch (e) {
                alert("Error: El motor no respondió. Verifica que Termux siga activo.");
                st.innerText = "Error de enlace.";
            }
        }
    </script>
</body>
</html>
