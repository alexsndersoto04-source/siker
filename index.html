<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIKER Engine v1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --google-blue: #4285f4; --google-red: #ea4335; --google-yellow: #fbbc05; --google-green: #34a853; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #fff; overflow-x: hidden; }
        
        /* Header */
        .header { display: flex; align-items: center; padding: 15px; background: #f8f9fa; border-bottom: 1px solid #ddd; justify-content: space-between; }
        .menu-icon { font-size: 24px; cursor: pointer; color: #5f6368; padding: 10px; }
        
        /* Side Menu */
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #fff; box-shadow: 5px 0 15px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding-top: 20px; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; font-size: 16px; color: #3c4043; transition: 0.2s; }
        .menu-item:hover { background: #f1f3f4; color: var(--google-blue); }
        .menu-item i { margin-right: 20px; font-size: 18px; width: 25px; text-align: center; }

        /* Main Content */
        .main { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .logo { font-size: 70px; font-weight: bold; margin-bottom: 30px; letter-spacing: -2px; }
        .logo span:nth-child(1) { color: var(--google-blue); }
        .logo span:nth-child(2) { color: var(--google-red); }
        .logo span:nth-child(3) { color: var(--google-yellow); }
        .logo span:nth-child(4) { color: var(--google-blue); }
        .logo span:nth-child(5) { color: var(--google-green); }
        .logo span:nth-child(6) { color: var(--google-red); }

        .search-container { width: 90%; max-width: 580px; position: relative; }
        .search-box { width: 100%; padding: 14px 50px; border-radius: 30px; border: 1px solid #dfe1e5; font-size: 16px; outline: none; box-shadow: none; transition: 0.3s; }
        .search-box:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: rgba(223,225,229,0); }
        
        .search-icon { position: absolute; left: 18px; top: 16px; color: #9aa0a6; }
        .mic-icon { position: absolute; right: 20px; top: 16px; color: var(--google-blue); cursor: pointer; }

        .btn-row { margin-top: 30px; }
        .btn { background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; margin: 5px; padding: 10px 16px; cursor: pointer; }
        .btn:hover { border: 1px solid #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        #status-bar { position: fixed; bottom: 0; width: 100%; background: #f2f2f2; padding: 10px 20px; font-size: 13px; color: #70757a; border-top: 1px solid #dadce0; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
        <div style="padding-right: 20px;"><i class="fas fa-user-circle menu-icon"></i></div>
    </div>

    <div id="sideMenu" class="side-menu">
        <div class="menu-item" onclick="buscarEnMotor()"><i class="fas fa-search"></i> Buscar ahora</div>
        <div class="menu-item" onclick="verHistorial()"><i class="fas fa-history"></i> Historial Real (Redmi 9C)</div>
        <div class="menu-item"><i class="fas fa-microchip"></i> Motor ARM Binario</div>
        <div class="menu-item"><i class="fas fa-tools"></i> Herramientas</div>
        <div class="menu-item"><i class="fas fa-cog"></i> Configuraciones</div>
    </div>

    <div class="main">
        <div class="logo">
            <span>S</span><span>I</span><span>K</span><span>E</span><span>R</span>
        </div>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-box" placeholder="Busca en tu motor binario...">
            <i class="fas fa-microphone mic-icon"></i>
        </div>
        <div class="btn-row">
            <button class="btn" onclick="buscarEnMotor()">Buscar con SIKER</button>
            <button class="btn">Voy a tener suerte</button>
        </div>
    </div>

    <div id="status-bar">Motor SIKER: <span id="motorStatus">En línea</span> | Redmi 9C Zulia</div>

    <script>
        // ESTA URL DEBE SER LA QUE TE DA TERMUX. 
        // Si no funciona, abre el link en una pestaña aparte y dale a "Continue"
        const URL_MOTOR = "https://224ead6bb2e8ceab-200-36-155-52.serveousercontent.com";

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        function buscarEnMotor() {
            const query = document.getElementById('searchInput').value;
            if(query) {
                alert("Buscando '" + query + "' en el motor binario ARM...");
            } else {
                alert("Escribe algo para buscar en tu base de datos.");
            }
        }

        async function verHistorial() {
            toggleMenu();
            const status = document.getElementById('motorStatus');
            status.innerText = "Conectando al Redmi 9C...";
            
            try {
                const response = await fetch(`${URL_MOTOR}/historial`);
                const data = await response.json();
                alert("HISTORIAL DESDE TU TELÉFONO:\n\n" + data.historial.join("\n"));
                status.innerText = "Conexión exitosa";
            } catch (e) {
                alert("ERROR: El puente está desconectado.\n\nAcción: Abre el link de Serveo en otra pestaña, dale a 'Continue' y refresca esta página.");
                status.innerText = "Error de conexión";
            }
        }
    </script>
</body>
</html>
