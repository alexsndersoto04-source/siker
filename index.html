<script>
    // Tu conexión real actualizada hoy
    const URL_MOTOR = "https://75579d75115df41b-200-36-155-52.serveousercontent.com";

    async function verHistorialReal() {
        // Intentamos cerrar el menú si tienes la función toggleSideMenu
        if (typeof toggleSideMenu === "function") {
            toggleSideMenu();
        }

        const status = document.getElementById('status-text');
        if (status) status.innerText = "Consultando mi_google.db en el Redmi 9C...";

        try {
            // Llamada real al motor en Termux
            const respuesta = await fetch(`${URL_MOTOR}/historial`);
            
            if (!respuesta.ok) throw new Error("Error en la respuesta del servidor");
            
            const datos = await respuesta.json();
            
            if (datos.historial && datos.historial.length > 0) {
                const lista = datos.historial.map(d => "• " + d).join("\n");
                alert("HISTORIAL REAL DESDE TU REDMI 9C:\n\n" + lista);
            } else {
                alert("Conectado al motor, pero el historial está vacío.");
            }
        } catch (error) {
            alert("ERROR: No se pudo contactar al motor. \n1. Revisa que Termux tenga el servidor y el túnel activos.\n2. Asegúrate de haber dado clic en 'Continue to Site' en el link de Serveo.");
            console.error("Error de conexión:", error);
        } finally {
            if (status) status.innerText = "Motor SIKER listo.";
        }
    }
</script>
